<!DOCTYPE html>
<html lang="en" data-theme="playful" class="cq-light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#7c3aed" />
<title>ComputeQuest — KS3 Computing Practice · by Mr Borketey</title>
<meta name="description" content="Practice computing for UK Year 7, 8 and 9. Free, no login, OCR-aligned, designed to feel like a game. Created by Mr Borketey (Harris Academy Purley)." />
<meta name="author" content="Mr Borketey" />
<meta name="copyright" content="© 2026 Mr Borketey. All rights reserved." />
<meta name="contact" content="j.borketey@harrispurley.org.uk" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;600&family=VT323&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: ['class', '.cq-dark'],
    theme: {
      extend: {
        colors: {
          bg:      'var(--cq-bg)',
          surface: 'var(--cq-surface)',
          sunken:  'var(--cq-sunken)',
          ink:     'var(--cq-ink)',
          muted:   'var(--cq-muted)',
          line:    'var(--cq-line)',
          primary: 'var(--cq-primary)',
          accent:  'var(--cq-accent)',
          warn:    'var(--cq-warn)',
          danger:  'var(--cq-danger)',
          success: 'var(--cq-success)',
        },
        fontFamily: {
          sans:    ['var(--cq-font-sans)','Inter','system-ui','sans-serif'],
          display: ['var(--cq-font-display)','"Plus Jakarta Sans"','system-ui','sans-serif'],
          mono:    ['"JetBrains Mono"','ui-monospace','monospace'],
        },
        borderRadius: { card: '20px', pill: '999px' },
        boxShadow: {
          card: 'var(--cq-shadow-card)',
          glow: 'var(--cq-shadow-glow)',
        },
      },
    },
  };
</script>
<style>
  /* ============================
     THEME VARIABLES
     ============================ */
  :root {
    --cq-font-sans: 'Inter';
    --cq-font-display: '"Plus Jakarta Sans"';
  }

  /* PLAYFUL — bright violet + mint, friendly */
  html[data-theme="playful"].cq-light {
    --cq-bg:      hsl(252 100% 99%);
    --cq-surface: hsl(0 0% 100%);
    --cq-sunken:  hsl(252 40% 96%);
    --cq-ink:     hsl(252 40% 12%);
    --cq-muted:   hsl(252 12% 45%);
    --cq-line:    hsl(252 30% 92%);
    --cq-primary: hsl(258 89% 60%);
    --cq-accent:  hsl(160 84% 42%);
    --cq-warn:    hsl(38 92% 55%);
    --cq-danger:  hsl(0 84% 60%);
    --cq-success: hsl(142 70% 42%);
    --cq-shadow-card: 0 1px 2px hsl(252 40% 12% / .04), 0 10px 30px hsl(258 60% 40% / .08);
    --cq-shadow-glow: 0 10px 40px hsl(258 89% 60% / .25);
    --cq-hero-gradient: radial-gradient(ellipse at top, hsl(258 89% 95%) 0%, hsl(252 100% 99%) 60%);
  }
  html[data-theme="playful"].cq-dark {
    --cq-bg:      hsl(252 30% 8%);
    --cq-surface: hsl(252 25% 12%);
    --cq-sunken:  hsl(252 25% 10%);
    --cq-ink:     hsl(252 30% 96%);
    --cq-muted:   hsl(252 12% 65%);
    --cq-line:    hsl(252 25% 20%);
    --cq-primary: hsl(258 89% 68%);
    --cq-accent:  hsl(160 70% 55%);
    --cq-warn:    hsl(38 92% 60%);
    --cq-danger:  hsl(0 84% 65%);
    --cq-success: hsl(142 60% 55%);
    --cq-shadow-card: 0 1px 2px hsl(0 0% 0% / .4), 0 10px 30px hsl(258 60% 5% / .5);
    --cq-shadow-glow: 0 10px 40px hsl(258 89% 60% / .35);
    --cq-hero-gradient: radial-gradient(ellipse at top, hsl(258 50% 18%) 0%, hsl(252 30% 8%) 60%);
  }

  /* NEON — cyberpunk dark with cyan/magenta */
  html[data-theme="neon"] {
    --cq-font-sans: '"JetBrains Mono"';
    --cq-font-display: '"JetBrains Mono"';
    --cq-bg:      hsl(240 30% 5%);
    --cq-surface: hsl(240 25% 9%);
    --cq-sunken:  hsl(240 25% 7%);
    --cq-ink:     hsl(180 100% 92%);
    --cq-muted:   hsl(220 20% 60%);
    --cq-line:    hsl(280 50% 25%);
    --cq-primary: hsl(180 100% 50%);
    --cq-accent:  hsl(320 100% 60%);
    --cq-warn:    hsl(50 100% 55%);
    --cq-danger:  hsl(0 100% 60%);
    --cq-success: hsl(135 100% 55%);
    --cq-shadow-card: 0 0 1px hsl(180 100% 50% / .6), 0 0 30px hsl(320 100% 60% / .15);
    --cq-shadow-glow: 0 0 30px hsl(180 100% 50% / .6);
    --cq-hero-gradient: radial-gradient(ellipse at top, hsl(280 60% 15%) 0%, hsl(240 30% 5%) 60%);
  }

  /* RETRO — pixel/CRT amber-green */
  html[data-theme="retro"] {
    --cq-font-sans: 'VT323';
    --cq-font-display: 'VT323';
    --cq-bg:      hsl(35 30% 8%);
    --cq-surface: hsl(35 25% 12%);
    --cq-sunken:  hsl(35 25% 10%);
    --cq-ink:     hsl(50 100% 70%);
    --cq-muted:   hsl(50 50% 55%);
    --cq-line:    hsl(120 40% 25%);
    --cq-primary: hsl(120 70% 55%);
    --cq-accent:  hsl(35 100% 60%);
    --cq-warn:    hsl(50 100% 55%);
    --cq-danger:  hsl(0 100% 65%);
    --cq-success: hsl(120 80% 55%);
    --cq-shadow-card: 0 0 1px hsl(120 70% 55% / .8), inset 0 0 60px hsl(0 0% 0% / .3);
    --cq-shadow-glow: 0 0 20px hsl(120 70% 55% / .5);
    --cq-hero-gradient: radial-gradient(ellipse at top, hsl(120 40% 12%) 0%, hsl(35 30% 8%) 60%);
  }
  html[data-theme="retro"] body { letter-spacing: 0.5px; }
  html[data-theme="retro"]::before {
    content:""; position:fixed; inset:0; pointer-events:none; z-index:50;
    background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, hsl(0 0% 0% / .06) 2px, hsl(0 0% 0% / .06) 3px);
  }

  /* MINIMAL — quiet near-monochrome */
  html[data-theme="minimal"].cq-light {
    --cq-bg:      hsl(40 20% 98%);
    --cq-surface: hsl(0 0% 100%);
    --cq-sunken:  hsl(40 15% 95%);
    --cq-ink:     hsl(0 0% 9%);
    --cq-muted:   hsl(0 0% 45%);
    --cq-line:    hsl(0 0% 90%);
    --cq-primary: hsl(0 0% 9%);
    --cq-accent:  hsl(20 80% 55%);
    --cq-warn:    hsl(38 92% 55%);
    --cq-danger:  hsl(0 70% 50%);
    --cq-success: hsl(150 50% 35%);
    --cq-shadow-card: 0 0 0 1px hsl(0 0% 90%);
    --cq-shadow-glow: 0 0 0 2px hsl(0 0% 9%);
    --cq-hero-gradient: linear-gradient(180deg, hsl(40 20% 98%), hsl(40 15% 96%));
  }
  html[data-theme="minimal"].cq-dark {
    --cq-bg:      hsl(0 0% 6%);
    --cq-surface: hsl(0 0% 10%);
    --cq-sunken:  hsl(0 0% 8%);
    --cq-ink:     hsl(0 0% 96%);
    --cq-muted:   hsl(0 0% 60%);
    --cq-line:    hsl(0 0% 20%);
    --cq-primary: hsl(0 0% 96%);
    --cq-accent:  hsl(20 80% 60%);
    --cq-warn:    hsl(38 92% 60%);
    --cq-danger:  hsl(0 70% 60%);
    --cq-success: hsl(150 50% 55%);
    --cq-shadow-card: 0 0 0 1px hsl(0 0% 20%);
    --cq-shadow-glow: 0 0 0 2px hsl(0 0% 96%);
    --cq-hero-gradient: linear-gradient(180deg, hsl(0 0% 6%), hsl(0 0% 8%));
  }

  /* GLOBAL */
  * { -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--cq-bg); color: var(--cq-ink); }
  body { font-family: var(--cq-font-sans), 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-display { font-family: var(--cq-font-display), 'Plus Jakarta Sans', system-ui, sans-serif; font-weight: 800; letter-spacing: -0.02em; }
  .hero-bg { background: var(--cq-hero-gradient); }

  /* ANIMATIONS */
  @keyframes pop      { 0%{transform:scale(.9);opacity:0} 60%{transform:scale(1.06)} 100%{transform:scale(1);opacity:1} }
  @keyframes slideUp  { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes shake    { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
  @keyframes pulse-glow { 0%,100%{box-shadow:0 0 0 0 hsl(258 89% 60% / .5)} 50%{box-shadow:0 0 0 14px hsl(258 89% 60% / 0)} }
  @keyframes flame    { 0%,100%{transform:scale(1) rotate(-2deg)} 50%{transform:scale(1.08) rotate(3deg)} }
  @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes spin-slow{ to{transform:rotate(360deg)} }
  @keyframes confetti-fall { to{transform:translateY(110vh) rotate(720deg);opacity:0} }
  @keyframes star-burst { 0%{transform:scale(.3);opacity:1} 100%{transform:scale(1.6);opacity:0} }
  @keyframes xp-rise { 0%{transform:translateY(0) scale(.8);opacity:0} 15%{transform:translateY(-10px) scale(1.1);opacity:1} 100%{transform:translateY(-90px) scale(1);opacity:0} }
  @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
  @keyframes bounce-happy { 0%,100%{transform:translateY(0) rotate(0)} 30%{transform:translateY(-14px) rotate(-6deg)} 60%{transform:translateY(-4px) rotate(4deg)} }
  @keyframes wiggle-sad { 0%,100%{transform:translateY(0) rotate(0)} 25%{transform:translateY(2px) rotate(-3deg)} 75%{transform:translateY(2px) rotate(3deg)} }
  @keyframes tilt-hover { 0%{transform:perspective(800px) rotateX(0) rotateY(0)} 100%{transform:perspective(800px) rotateX(2deg) rotateY(-3deg)} }
  @keyframes count-up { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes shimmer-bg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  @keyframes combo-pop  { 0%{transform:scale(.4) rotate(-12deg);opacity:0} 60%{transform:scale(1.15) rotate(3deg);opacity:1} 100%{transform:scale(1) rotate(0)} }
  @keyframes ring-grow  { 0%{transform:scale(.6);opacity:.7} 100%{transform:scale(1.8);opacity:0} }
  @keyframes drift      { 0%{transform:translate(0,0)} 50%{transform:translate(8px,-12px)} 100%{transform:translate(0,0)} }

  .anim-xp-rise   { animation: xp-rise 1.2s ease-out forwards; }
  .anim-sparkle   { animation: sparkle 1s ease-in-out infinite; }
  .anim-happy     { animation: bounce-happy .8s cubic-bezier(.34,1.56,.64,1); }
  .anim-sad       { animation: wiggle-sad .55s ease-in-out 2; }
  .anim-count     { animation: count-up .35s ease-out both; }
  .anim-combo     { animation: combo-pop .5s cubic-bezier(.34,1.56,.64,1) both; }
  .anim-ring-grow { animation: ring-grow .9s ease-out forwards; }
  .anim-drift     { animation: drift 18s ease-in-out infinite; }

  /* Glassmorphism card variant */
  .glass {
    background: linear-gradient(135deg, hsl(0 0% 100% / .55) 0%, hsl(0 0% 100% / .25) 100%);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    border: 1px solid hsl(0 0% 100% / .35);
  }
  .cq-dark .glass {
    background: linear-gradient(135deg, hsl(252 30% 15% / .65) 0%, hsl(252 30% 10% / .5) 100%);
    border: 1px solid hsl(0 0% 100% / .08);
  }
  html[data-theme="neon"] .glass {
    background: linear-gradient(135deg, hsl(280 60% 15% / .6) 0%, hsl(240 30% 7% / .8) 100%);
    border: 1px solid hsl(180 100% 50% / .25);
  }

  /* Tilt effect for cards on hover (subtle, desktop only) */
  @media (hover:hover) {
    .tilt:hover { transform: perspective(900px) translateY(-3px) rotateX(2deg) rotateY(-2deg); }
  }
  .tilt { transition: transform .35s cubic-bezier(.2,.8,.2,1); }

  /* Floating XP container */
  .xp-float {
    position: absolute; pointer-events: none; z-index: 60;
    font-weight: 800; font-size: 1.5rem;
    color: var(--cq-success);
    text-shadow: 0 2px 12px hsl(142 76% 45% / .5);
  }

  /* Sparkles around correct answers */
  .sparkle {
    position:absolute; width:6px; height:6px;
    background: radial-gradient(circle, white 0%, transparent 70%);
    pointer-events:none;
  }

  /* Combo banner */
  .combo-banner {
    position: fixed; top: 96px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(90deg, var(--cq-primary), var(--cq-accent));
    color: white; font-weight: 800; font-family: var(--cq-font-display);
    padding: .5rem 1.2rem; border-radius: 999px;
    box-shadow: var(--cq-shadow-glow);
    z-index: 70; letter-spacing: .02em;
  }

  /* Drag-and-drop visual states for ordering */
  .drag-item   { cursor: grab; }
  .drag-item:active { cursor: grabbing; }
  .drag-dragging { opacity: .4; }
  .drag-over   { outline: 3px dashed var(--cq-primary); outline-offset: -3px; background: var(--cq-sunken); }

  /* Animated gradient backgrounds for hero cards */
  .gradient-flow {
    background: linear-gradient(120deg, var(--cq-primary), var(--cq-accent), var(--cq-warn), var(--cq-primary));
    background-size: 300% 300%;
    animation: shimmer-bg 8s ease infinite;
  }

  /* Subtle background particles */
  .bg-particles { position: absolute; inset:0; pointer-events: none; overflow:hidden; }
  .bg-particles span {
    position:absolute; width:10px; height:10px; border-radius:50%;
    background: var(--cq-primary); opacity:.12; animation: drift 24s ease-in-out infinite;
  }

  /* Streak counter inside quiz */
  .streak-meter {
    display: inline-flex; align-items: center; gap: .35rem;
    padding: .2rem .6rem; border-radius: 999px;
    background: linear-gradient(90deg, var(--cq-warn), var(--cq-danger));
    color: white; font-weight: 800;
    box-shadow: 0 4px 16px hsl(38 92% 55% / .35);
  }

  /* Larger touch targets on mobile */
  @media (max-width: 640px) {
    .choice { font-size: 1.02rem; }
    .btn-primary { padding: 1rem 1.4rem; }
  }

  /* ============================
     CHATBOT (QUANTA)
     ============================ */
  .cq-fab {
    position: fixed; bottom: 22px; right: 22px;
    width: 62px; height: 62px; border-radius: 50%;
    background: linear-gradient(135deg, var(--cq-primary), var(--cq-accent));
    color: white; font-size: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: var(--cq-shadow-glow);
    z-index: 80; cursor: pointer; border: none;
    transition: transform .22s cubic-bezier(.34,1.56,.64,1);
  }
  .cq-fab:hover { transform: scale(1.08) rotate(-4deg); }
  .cq-fab::after {
    content:''; position:absolute; inset:-4px; border-radius:50%;
    border:2px solid var(--cq-primary); opacity:.5;
    animation: pulse-glow 2.4s infinite;
  }

  .cq-bot-badge {
    position: absolute; top: -4px; right: -4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--cq-warn); color: white;
    font-size: 11px; font-weight: 800;
    display: inline-flex; align-items: center; justify-content: center;
    animation: pop .5s cubic-bezier(.34,1.56,.64,1);
  }

  .cq-panel {
    position: fixed; bottom: 100px; right: 22px;
    width: 380px; max-width: calc(100vw - 44px);
    height: 560px; max-height: calc(100vh - 140px);
    background: var(--cq-surface);
    border: 1px solid var(--cq-line);
    border-radius: 22px;
    box-shadow: 0 24px 70px hsl(258 60% 20% / .35);
    z-index: 90;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  @media (max-width: 480px) {
    .cq-panel { right: 12px; left: 12px; width: auto; bottom: 92px; }
  }

  .cq-panel-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: linear-gradient(135deg, var(--cq-primary), var(--cq-accent));
    color: white;
  }
  .cq-panel-header .name { font-family: var(--cq-font-display); font-weight: 800; }
  .cq-panel-header .role { font-size: .72rem; opacity: .85; }
  .cq-close-btn { margin-left: auto; background: rgba(255,255,255,.18); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; line-height: 1; }
  .cq-close-btn:hover { background: rgba(255,255,255,.3); }

  .cq-messages {
    flex: 1; overflow-y: auto;
    padding: 14px; display: flex; flex-direction: column; gap: 8px;
    background: var(--cq-bg);
  }
  .cq-msg {
    max-width: 86%; padding: 9px 13px; border-radius: 16px;
    line-height: 1.45; font-size: .92rem;
    white-space: pre-wrap; word-wrap: break-word;
    animation: slideUp .22s ease-out both;
  }
  .cq-msg-user { align-self: flex-end; background: var(--cq-primary); color: white; border-bottom-right-radius: 4px; }
  .cq-msg-bot  { align-self: flex-start; background: var(--cq-surface); border: 1px solid var(--cq-line); border-bottom-left-radius: 4px; }
  .cq-msg-bot strong { color: var(--cq-primary); }

  .cq-typing { display: inline-flex; align-items: center; gap: 4px; }
  .cq-typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--cq-muted);
    animation: typing-bounce 1.2s infinite ease-in-out;
  }
  .cq-typing span:nth-child(2) { animation-delay: .15s; }
  .cq-typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes typing-bounce {
    0%,80%,100% { transform: scale(.6); opacity:.4; }
    40% { transform: scale(1); opacity:1; }
  }

  .cq-suggestions {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 10px 12px 0;
    background: var(--cq-bg);
  }
  .cq-suggestions button {
    background: var(--cq-sunken); color: var(--cq-ink);
    border: 1px solid var(--cq-line); border-radius: 999px;
    font-size: .78rem; padding: 6px 10px; cursor: pointer;
    transition: all .15s;
  }
  .cq-suggestions button:hover { background: var(--cq-primary); color: white; border-color: var(--cq-primary); }

  .cq-input-row {
    display: flex; gap: 8px; padding: 10px 12px 12px;
    background: var(--cq-bg); border-top: 1px solid var(--cq-line);
  }
  .cq-input-row input {
    flex: 1; background: var(--cq-surface); color: var(--cq-ink);
    border: 1px solid var(--cq-line); border-radius: 12px;
    padding: .6rem .9rem; font-family: inherit; font-size: .92rem;
  }
  .cq-input-row input:focus { outline: none; border-color: var(--cq-primary); }
  .cq-send-btn {
    background: var(--cq-primary); color: white;
    border: none; border-radius: 12px;
    padding: 0 14px; font-weight: 700; cursor: pointer;
  }
  .cq-send-btn:disabled { opacity: .4; cursor: not-allowed; }

  .anim-pop     { animation: pop .35s cubic-bezier(.34,1.56,.64,1) both; }
  .anim-slideUp { animation: slideUp .28s ease-out both; }
  .anim-shake   { animation: shake .42s ease-in-out both; }
  .anim-flame   { animation: flame 1.6s ease-in-out infinite; }
  .anim-float   { animation: float 3s ease-in-out infinite; }
  .anim-pulse-glow { animation: pulse-glow 1.6s ease-out infinite; }
  .anim-spin-slow  { animation: spin-slow 14s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  }

  /* CHOICE BUTTON STATES */
  .choice-correct { background: hsl(142 70% 95%); border-color: var(--cq-success) !important; color: var(--cq-success); }
  .cq-dark .choice-correct { background: hsl(142 40% 18%); }
  .choice-wrong   { background: hsl(0 84% 96%); border-color: var(--cq-danger) !important; color: var(--cq-danger); }
  .cq-dark .choice-wrong   { background: hsl(0 50% 18%); }
  .choice-shimmer { background: linear-gradient(110deg, transparent 30%, hsl(0 0% 100% / .25) 50%, transparent 70%); background-size: 200% 100%; animation: shimmer 1.5s linear infinite; }
  @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

  /* CONFETTI */
  .confetti-piece {
    position: fixed; top: -10vh; width: 10px; height: 14px; will-change: transform, opacity;
    animation: confetti-fall linear forwards; z-index: 100; border-radius: 2px;
  }

  /* MASCOT */
  .mascot-eye { transform-origin: center; }

  /* PROGRESS RING */
  .ring-track { stroke: var(--cq-line); }
  .ring-fill  { stroke: var(--cq-primary); transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1); }

  /* PIXEL ART for retro */
  html[data-theme="retro"] .pixelate { image-rendering: pixelated; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--cq-line); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--cq-muted); }

  /* UTILITY CLASSES */
  .card { background: var(--cq-surface); border: 1px solid var(--cq-line); box-shadow: var(--cq-shadow-card); border-radius: 20px; }

function loadProgress() {
  try {
    const raw = localStorage.getItem('cq:progress');
    if (!raw) return { ...DEFAULT_PROGRESS };
    return { ...DEFAULT_PROGRESS, ...JSON.parse(raw) };
  } catch { return { ...DEFAULT_PROGRESS }; }
}
function saveProgress(p) { try { localStorage.setItem('cq:progress', JSON.stringify(p)); } catch {} }

function computeLevel(xp) { return 1 + Math.floor(Math.sqrt(xp / 50)); }
function xpForLevel(lvl) { return Math.pow(lvl - 1, 2) * 50; }
function xpProgressInLevel(xp) {
  const lvl = computeLevel(xp);
  const cur = xpForLevel(lvl);
  const nxt = xpForLevel(lvl + 1);
  return { lvl, cur, nxt, pct: (xp - cur) / (nxt - cur) };
}

const TEACHER_EMAIL = 'j.borketey@harrispurley.org.uk';
const ANALYTICS_KEY = 'cq:analytics';
const SESSION_KEY   = 'cq:session';

function defaultAnalytics() {
  return {
    firstSeen: todayISO(),
    daily: {},
    totals: { visits: 0, questions: 0, correct: 0, quizzes: 0, chatbotMessages: 0, bossesWon: 0 },
  };
}
function loadAnalytics() {
  try {
    const raw = localStorage.getItem(ANALYTICS_KEY);
    if (!raw) return defaultAnalytics();
    return { ...defaultAnalytics(), ...JSON.parse(raw) };
  } catch { return defaultAnalytics(); }
}
function saveAnalytics(a) { try { localStorage.setItem(ANALYTICS_KEY, JSON.stringify(a)); } catch {} }

function ensureToday(a) {
  const k = todayISO();
  if (!a.daily[k]) {
    a.daily[k] = { visits: 0, questions: 0, correct: 0, quizzes: 0, chatbotMessages: 0, topics: [], bossesWon: 0, firstSeen: new Date().toISOString() };
  }
  return a.daily[k];
}

const Track = {
  visit() {
    // One "visit" per browser tab session
    const already = sessionStorage.getItem(SESSION_KEY);
    if (already === todayISO()) return;
    sessionStorage.setItem(SESSION_KEY, todayISO());
    const a = loadAnalytics();
    const t = ensureToday(a);
    t.visits += 1;
    a.totals.visits += 1;
    saveAnalytics(a);
  },
  answer(correct, topicId) {
    const a = loadAnalytics();
    const t = ensureToday(a);
    t.questions += 1; a.totals.questions += 1;
    if (correct) { t.correct += 1; a.totals.correct += 1; }
    if (topicId && !t.topics.includes(topicId)) t.topics.push(topicId);
    saveAnalytics(a);
  },
  quizDone() {
    const a = loadAnalytics();
    const t = ensureToday(a);
    t.quizzes += 1; a.totals.quizzes += 1;
    saveAnalytics(a);
  },
  bossWon() {
    const a = loadAnalytics();
    const t = ensureToday(a);
    t.bossesWon += 1; a.totals.bossesWon = (a.totals.bossesWon || 0) + 1;
    saveAnalytics(a);
  },
  chatMsg() {
    const a = loadAnalytics();
    const t = ensureToday(a);
    t.chatbotMessages += 1; a.totals.chatbotMessages += 1;
    saveAnalytics(a);
  },
};

    `Chatbot messages:    ${today.chatbotMessages || 0}`,
    '',
    '── ALL-TIME (this device) ──',
    `Visits:              ${totals.visits}`,
    `Quizzes completed:   ${totals.quizzes}`,
    `Bosses won:          ${totals.bossesWon || 0}`,
    `Questions answered:  ${totals.questions}`,

function fireConfetti({ count = 40, palette } = {}) {
  const colors = palette || ['#7c3aed', '#22c55e', '#f59e0b', '#ec4899', '#06b6d4'];
  const root = document.body;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = (Math.random() * 100) + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (1.4 + Math.random() * 1.6) + 's';
    el.style.animationDelay = (Math.random() * 0.3) + 's';
    el.style.transform = `translateY(0) rotate(${Math.random()*360}deg)`;
    root.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

/* ============================================================
   QUESTION ENGINE
   ============================================================ */
// Fisher-Yates shuffle (in-place)
function fyShuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Randomise answer-option order for MC questions (and remap the answer index).
// Other types keep their semantic ordering (TF, match, order, fitb).
function shuffleQuestion(q) {
  if (q.type !== 'mc' || !Array.isArray(q.options) || q.options.length < 2) return q;
  const indices = q.options.map((_, i) => i);
  fyShuffle(indices);
  return {
    ...q,
    options: indices.map(i => q.options[i]),
    answer:  indices.indexOf(q.answer),
  };
}

function pickQuestionsFor(year, topicId, n = 15, seenIds = new Set(), targetDifficulty = 2) {
  const pool = QUESTIONS.filter(q => q.year === year && (!topicId || q.topic === topicId));
  const unseen = pool.filter(q => !seenIds.has(q.id));
  const source = unseen.length >= n ? unseen : pool;
  // Score combines difficulty match with strong randomness so each session feels fresh.
  const scored = source.map(q => ({
    q, s: -Math.abs(q.difficulty - targetDifficulty) * 0.5 + Math.random() * 2
  })).sort((a, b) => b.s - a.s);
  const picked = scored.slice(0, n).map(x => x.q);
  fyShuffle(picked); // randomise final order
  return picked.map(shuffleQuestion);
}

function pickDailyQuestion(year) {
  // Deterministic per day so all students get the same daily challenge
  const seed = parseInt(todayISO().replace(/-/g, ''));
  const pool = QUESTIONS.filter(q => q.year === year && q.difficulty >= 2);
  return shuffleQuestion(pool[seed % pool.length]);
}

function pickBossSet(year) {
  const pool = QUESTIONS.filter(q => q.year === year);
  const easy = pool.filter(q => q.difficulty <= 2);
  const med  = pool.filter(q => q.difficulty === 3);
  const hard = pool.filter(q => q.difficulty >= 4);
  const sample = (arr, n) => fyShuffle([...arr]).slice(0, n);
  // 20 questions: 5 easy, 8 medium, 7 hard — escalating difficulty
  return [...sample(easy, 5), ...sample(med, 8), ...sample(hard, 7)].map(shuffleQuestion);
}

function Ring({ pct = 0, size = 56, stroke = 6, children }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c - Math.max(0, Math.min(1, pct)) * c;
  return (
    <div className="relative inline-flex items-center justify-center" style={{ width: size, height: size }}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke} className="ring-track" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke} strokeLinecap="round"
                strokeDasharray={c} strokeDashoffset={off} className="ring-fill" />
      </svg>
      <div className="absolute text-xs font-bold">{children}</div>
    </div>
  );
}

function ChoiceButton({ children, onClick, state, disabled }) {
  const base = 'choice w-full text-left rounded-2xl border-2 p-4 font-medium transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0';
  let style = 'bg-surface border-line';
  if (state === 'correct') style = 'choice-correct';
  if (state === 'wrong')   style = 'choice-wrong';
  if (state === 'fadeOut') style = 'opacity-50 bg-surface border-line';
  return (
    <button className={`${base} ${style}`} onClick={onClick} disabled={disabled}>
      {children}
    </button>
  );
}

function MCQuestion({ question, onAnswer, locked, picked }) {
  return (
    <div className="grid gap-3">
      {question.options.map((opt, i) => {
        let state = null;
        if (locked) {
          if (i === question.answer) state = 'correct';
          else if (i === picked)     state = 'wrong';
          else                       state = 'fadeOut';
        }
        return (
          <ChoiceButton key={i} state={state} disabled={locked}
            onClick={() => onAnswer(i)}>
            <span className="inline-flex items-center gap-3">
              <span className="w-7 h-7 rounded-lg bg-sunken text-sm font-bold inline-flex items-center justify-center">
                {'ABCD'[i]}
              </span>
              <span>{opt}</span>
            </span>
          </ChoiceButton>
        );
      })}
    </div>
  );
}

function TFQuestion({ question, onAnswer, locked, picked }) {
  return (
    <div className="grid grid-cols-2 gap-3">
      {question.options.map((opt, i) => {
        let state = null;
        if (locked) {
          if (i === question.answer) state = 'correct';

}

function FillBlankQuestion({ question, onAnswer, locked }) {
  const [val, setVal] = useState('');
  const isBinary = /binary|hex/i.test(question.prompt);
  return (
    <div className="grid gap-3">
      <input
        autoFocus
        className={`input text-lg ${isBinary ? 'font-mono tracking-widest' : ''}`}
        placeholder="Type your answer…"
        value={val}
        disabled={locked}
        onChange={e => setVal(e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter' && val.trim()) onAnswer(val.trim()); }}
      />
      <button className="btn-primary" disabled={locked || !val.trim()} onClick={() => onAnswer(val.trim())}>
        Submit answer
      </button>
    </div>
  );
}

function MatchQuestion({ question, onAnswer, locked }) {
  // question.options = [[left, right], ...]; question.answer = expected mapping indices for left→right
  const lefts  = question.options.map(p => p[0]);
  const rights = useMemo(() => {
    const shuffled = question.options.map((p, i) => ({ text: p[1], origIdx: i }));
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }, [question.id]);

  const [selectedLeft, setSelectedLeft] = useState(null);
  const [pairs, setPairs] = useState({}); // leftIdx -> rightOrigIdx
  const used = new Set(Object.values(pairs));

  const handleRight = (rOrigIdx) => {
    if (selectedLeft === null) return;
    setPairs(p => ({ ...p, [selectedLeft]: rOrigIdx }));
    setSelectedLeft(null);
  };

  useEffect(() => {
    if (Object.keys(pairs).length === lefts.length && !locked) {
      // Compute correctness — true if every leftIdx maps to its same right (origIdx === leftIdx)
      const allRight = lefts.every((_, i) => pairs[i] === i);
      onAnswer(allRight ? 'correct' : pairs);
    }
  }, [pairs]);

  return (
    <div className="grid grid-cols-2 gap-3">
      <div className="grid gap-2">
        {lefts.map((l, i) => {
          const matched = pairs[i] !== undefined;
          const correct = locked && matched && pairs[i] === i;
          const wrong   = locked && matched && pairs[i] !== i;
          const sel     = selectedLeft === i;
          return (
            <button key={i}
              className={`text-left rounded-2xl border-2 p-3 font-medium transition
                ${matched ? 'opacity-70' : ''}
                ${sel ? 'border-primary bg-sunken' : 'border-line bg-surface'}
                ${correct ? 'choice-correct' : ''} ${wrong ? 'choice-wrong' : ''}`}
              disabled={locked || matched}
              onClick={() => setSelectedLeft(i)}>
              {l}
            </button>
          );
        })}
      </div>
      <div className="grid gap-2">
        {rights.map(r => {
          const isUsed = used.has(r.origIdx);
          return (
            <button key={r.origIdx}
              className={`text-left rounded-2xl border-2 p-3 font-medium transition
                ${isUsed ? 'opacity-50' : ''}
                border-line bg-surface hover:border-primary`}
              disabled={isUsed || selectedLeft === null || locked}
              onClick={() => handleRight(r.origIdx)}>
              {r.text}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function OrderQuestion({ question, onAnswer, locked }) {
  // Build shuffled list, then let user EITHER drag to reorder OR click to assign positions.
  const initial = useMemo(() => {
    const arr = question.options.map((t, i) => ({ text: t, origIdx: i }));
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }, [question.id]);

  const [list, setList] = useState(initial);
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [submitted, setSubmitted] = useState(false);

  const onDragStart = (i) => (e) => {
    if (locked) return;
    setDragIdx(i);
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', String(i)); } catch {}
  };
  const onDragOver = (i) => (e) => { e.preventDefault(); setOverIdx(i); };
  const onDrop = (i) => (e) => {
    e.preventDefault();
    if (dragIdx === null || dragIdx === i) return;
    const next = [...list];
    const [moved] = next.splice(dragIdx, 1);
    next.splice(i, 0, moved);
    setList(next);
    setDragIdx(null);
    setOverIdx(null);
  };
  const onDragEnd = () => { setDragIdx(null); setOverIdx(null); };

  // Move up/down buttons for keyboard / touch fallback
  const move = (i, dir) => {
    if (locked) return;
    const j = i + dir;
    if (j < 0 || j >= list.length) return;
    const next = [...list];
    [next[i], next[j]] = [next[j], next[i]];
    setList(next);
  };

  const submit = () => {
    if (locked || submitted) return;
    setSubmitted(true);
    const correctOrder = list.every((item, i) => item.origIdx === i);
    onAnswer(correctOrder ? 'correct' : list.map(x => x.origIdx));
  };

  return (
    <div>
      <div className="mb-3 text-sm text-muted">
        ↕️ Drag (or use ▲ ▼) to put the steps in order, then submit:
      </div>
      <div className="grid gap-2">
        {list.map((s, i) => {
          const dragging = dragIdx === i;
          const over     = overIdx === i && dragIdx !== null && dragIdx !== i;
          const isCorrectPos = locked && s.origIdx === i;
          const isWrongPos   = locked && s.origIdx !== i;
          return (
            <div key={s.origIdx}
              draggable={!locked}
              onDragStart={onDragStart(i)}
              onDragOver={onDragOver(i)}
              onDrop={onDrop(i)}
              onDragEnd={onDragEnd}
              className={`drag-item flex items-center gap-2 rounded-2xl border-2 p-3 transition
                ${dragging ? 'drag-dragging' : ''}
                ${over ? 'drag-over' : 'border-line bg-surface'}
                ${isCorrectPos ? 'choice-correct' : ''} ${isWrongPos ? 'choice-wrong' : ''}`}>
              <span className="w-7 h-7 rounded-lg text-sm font-bold inline-flex items-center justify-center bg-primary text-white">{i + 1}</span>
              <span className="flex-1">{s.text}</span>
              <span className="text-muted text-lg select-none hidden sm:inline">⋮⋮</span>
              <div className="flex flex-col gap-1 sm:hidden">
                <button onClick={() => move(i, -1)} disabled={locked || i === 0} className="px-2 rounded bg-sunken text-xs">▲</button>
                <button onClick={() => move(i,  1)} disabled={locked || i === list.length - 1} className="px-2 rounded bg-sunken text-xs">▼</button>
              </div>
            </div>
          );
        })}
      </div>
      {!locked && (
        <button onClick={submit} className="btn-primary w-full mt-3" disabled={submitted}>
          Submit order
        </button>
      )}
    </div>
  );
}

function QuestionRenderer({ question, onAnswer, locked, picked }) {
  switch (question.type) {
    case 'mc':    return <MCQuestion       question={question} onAnswer={onAnswer} locked={locked} picked={picked} />;
    case 'tf':    return <TFQuestion       question={question} onAnswer={onAnswer} locked={locked} picked={picked} />;
    case 'fitb':  return <FillBlankQuestion question={question} onAnswer={onAnswer} locked={locked} />;
    case 'match': return <MatchQuestion    question={question} onAnswer={onAnswer} locked={locked} />;
    case 'order': return <OrderQuestion    question={question} onAnswer={onAnswer} locked={locked} />;
    default:      return <MCQuestion       question={question} onAnswer={onAnswer} locked={locked} picked={picked} />;
  }
}

function checkAnswer(question, picked) {
  if (picked === 'correct') return true;
  if (question.type === 'mc' || question.type === 'tf') return picked === question.answer;
  if (question.type === 'fitb') {
    const a = String(question.answer).trim().toLowerCase();
    const p = String(picked).trim().toLowerCase();
    return a === p;
  }
  return false;
}

function QuizPage({ year, topicId, mode = 'quiz', progress, setProgress, onNav }) {
  const totalQ = mode === 'daily' ? 1 : 15;
  const questions = useMemo(() => {
    if (mode === 'daily') return [pickDailyQuestion(year)];
    const seen = new Set();
    const t = progress.perTopic[topicId];
    const target = t && t.attempts > 0 ? Math.min(5, Math.max(1, Math.round(t.correct / t.attempts * 4 + 1))) : 2;
    return pickQuestionsFor(year, topicId, totalQ, seen, target);
  }, [year, topicId, mode]);

  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [locked, setLocked] = useState(false);
  const [revealHint, setRevealHint] = useState(false);
  const [sessionCorrect, setSessionCorrect] = useState(0);
  const [sessionStreak, setSessionStreak] = useState(0);
  const [shake, setShake] = useState(false);
  const [startedAt] = useState(Date.now());
  const [xpFloatKey, setXpFloatKey] = useState(0);
  const [xpFloatAmt, setXpFloatAmt] = useState(0);
  const [comboKey, setComboKey] = useState(0);
  const [comboCount, setComboCount] = useState(0);

  const cur = questions[idx];
  const topic = topicId ? TOPIC_BY[topicId] : null;
  const lastCorrect = locked && checkAnswer(cur, picked);
  const mascotMood = !locked ? 'idle' : (lastCorrect ? 'happy' : 'sad');

  // Tell the chatbot which question the student is on right now
  const quizCtxRef = React.useContext(QuizCtx);
  useEffect(() => {
    quizCtxRef.setCurrent({ question: cur, topic, locked, year, mode });
    return () => quizCtxRef.setCurrent(null);
  }, [cur && cur.id, locked]);

  const handleAnswer = (chosen) => {
    if (locked) return;
    const correct = checkAnswer(cur, chosen);
    setPicked(chosen);
    setLocked(true);
    Track.answer(correct, cur.topic);

    if (correct) {
      Audio.correct();
      fireConfetti({ count: 18 });
      setSessionCorrect(c => c + 1);
      const newStreak = sessionStreak + 1;
      setSessionStreak(newStreak);
      const earned = mode === 'daily' ? cur.xp * 2 : cur.xp;
      setXpFloatAmt(earned);
      setXpFloatKey(k => k + 1);
      if (newStreak === 3 || newStreak === 5 || newStreak === 10 || newStreak === 20) {
        setComboCount(newStreak);
        setComboKey(k => k + 1);
      }
    } else {
      Audio.wrong();
      setShake(true);
      setTimeout(() => setShake(false), 500);
      setSessionStreak(0);
    }

    // Update global progress
    setProgress(p => {
      const np = { ...p };
      np.totalAnswered = (p.totalAnswered || 0) + 1;
      if (correct) {
        np.totalCorrect = (p.totalCorrect || 0) + 1;
        np.xp = (p.xp || 0) + (mode === 'daily' ? cur.xp * 2 : cur.xp);
      }
      np.level = computeLevel(np.xp);
      np.bestStreak = Math.max(p.bestStreak || 0, sessionStreak + (correct ? 1 : 0));
      if (cur.topic) {
        const t = np.perTopic[cur.topic] || { correct: 0, attempts: 0, elo: 1000 };
        const delta = correct ? 16 : -12;
        np.perTopic = { ...np.perTopic, [cur.topic]: {
          correct: t.correct + (correct ? 1 : 0),
          attempts: t.attempts + 1,
          elo: Math.max(800, t.elo + delta),
        }};
      }
      // streak day
      const today = todayISO();
      if (p.lastPlayedISO !== today) {
        const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
        np.streakDays = p.lastPlayedISO === yesterday ? (p.streakDays || 0) + 1 : 1;
        np.lastPlayedISO = today;
      }
      if (mode === 'daily' && correct) {
        np.dailyChallengeISO = today;
        np.dailiesDone = (p.dailiesDone || 0) + 1;
      }
      // comeback achievement check
      if (sessionStreak === 0 && correct && p.totalAnswered > 0) {
        // we'd need to track consecutive — approximated via sessionStreak below
      }
      // Award badges
      const unlocked = new Set(np.unlockedBadges);
      ACHIEVEMENTS.forEach(a => { if (a.rule(np)) unlocked.add(a.id); });
      np.unlockedBadges = [...unlocked];
      // Unlock themes by XP
      THEMES.forEach(t => { if (np.xp >= t.unlockXP && !np.unlockedThemes.includes(t.id)) np.unlockedThemes = [...np.unlockedThemes, t.id]; });
      return np;
    });
  };

  const next = () => {
    if (idx + 1 >= questions.length) {
      // End of quiz
      const elapsed = Math.round((Date.now() - startedAt) / 1000);
      Track.quizDone();
      setProgress(p => {
        const np = { ...p };
        if (elapsed < (p.fastestQuizSec || Infinity) && questions.length === 15) np.fastestQuizSec = elapsed;
        np.lastResults = { year, topicId, mode, sessionCorrect, total: questions.length, elapsedSec: elapsed };
        return np;
      });
      onNav({ page: 'results', year, topicId, mode });
      return;
    }
    setIdx(i => i + 1);
    setPicked(null);
    setLocked(false);
    setRevealHint(false);
  };

  if (!cur) return null;

  return (
    <div className="max-w-2xl mx-auto px-4 py-6">
      {comboKey > 0 && <ComboBanner key={comboKey} count={comboCount} />}
      <div className="flex items-center justify-between mb-4">
        <button className="text-sm text-muted hover:text-ink flex items-center gap-1" onClick={() => onNav({ page: 'dashboard', year })}>
          ← {topic ? topic.name : (mode === 'daily' ? 'Daily challenge' : 'Quiz')}
        </button>
        <div className="flex items-center gap-3">
          {sessionStreak >= 2 && (
            <span className="streak-meter text-xs anim-count" key={'sm'+sessionStreak}>🔥 {sessionStreak} streak</span>
          )}
          <div className="flex gap-1">
            {questions.map((_, i) => (
              <span key={i} className={`w-2 h-2 rounded-full transition ${i < idx ? 'bg-success' : i === idx ? 'bg-primary scale-125' : 'bg-line'}`} />
            ))}
          </div>
        </div>
      </div>

      <div className="relative">
        {locked && lastCorrect && xpFloatKey > 0 && (
          <span key={'xp'+xpFloatKey} className="xp-float anim-xp-rise"
                style={{ right: '24px', top: '24px' }}>+{xpFloatAmt} XP</span>
        )}
        <div className="absolute -right-2 -top-6 hidden sm:block z-20 pointer-events-none">
          <Mascot size={64} mood={mascotMood} />
        </div>
      <div className={`card p-5 md:p-7 ${shake ? 'anim-shake' : 'anim-pop'}`} key={cur.id}>
        <div className="flex items-center justify-between gap-2 mb-3">
          <div className="flex gap-2 flex-wrap">
            {topic && <span className="chip">{topic.emoji} {topic.name}</span>}
            <span className="chip">Difficulty {'⭐'.repeat(cur.difficulty)}</span>
            {mode === 'daily' && <span className="chip">2× XP</span>}
          </div>
          <span className="chip">+{cur.xp} XP</span>
        </div>

        <h2 className="font-display text-xl md:text-2xl leading-snug mb-5">{cur.prompt}</h2>

        <QuestionRenderer question={cur} onAnswer={handleAnswer} locked={locked} picked={picked} />

        {!locked && cur.hint && (
          <div className="mt-4">
            {!revealHint ? (
              <button className="btn-ghost text-sm" onClick={() => setRevealHint(true)}>💡 Use a hint</button>
            ) : (
              <div className="card p-3 mt-1 bg-sunken border-warn"><span className="font-semibold">Hint:</span> {cur.hint}</div>
            )}
          </div>
        )}

        {locked && (
          <div className="mt-5 anim-slideUp">
            <div className={`card p-4 ${checkAnswer(cur, picked) ? 'border-success' : 'border-danger'}`}>
              <div className="font-display text-lg mb-1">
                {checkAnswer(cur, picked) ? '🎉 Correct!' : '🤏 Not quite.'}
              </div>
              <div className="text-muted">{cur.explanation}</div>
              {!checkAnswer(cur, picked) && cur.type === 'fitb' && (
                <div className="mt-2 text-sm">Answer: <span className="font-mono">{cur.answer}</span></div>
              )}
            </div>
            <button onClick={next} className="btn-primary w-full mt-4">
              {idx + 1 >= questions.length ? 'See results' : 'Next question →'}
            </button>
          </div>
        )}
      </div>
      </div>
    </div>
  );
}

// --- BOSS BATTLE ---------------------------------------------------------
function BossPage({ year, progress, setProgress, onNav }) {
  const bossList = ['🐲 Dragon of Decomposition','👾 Bug of Bytes','🤖 Robot of Recursion'];
  const boss = bossList[progress.bossesBeaten % bossList.length];
  const [phase, setPhase] = useState('intro'); // intro | fight | done
  const [qs] = useState(() => pickBossSet(year));
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [locked, setLocked] = useState(false);
  const [bossHP, setBossHP] = useState(100);
  const [playerHP, setPlayerHP] = useState(100);
  const [timeLeft, setTimeLeft] = useState(20);
  const [correct, setCorrect] = useState(0);
  const [shake, setShake] = useState(false);
  const timerRef = useRef();
  const quizCtxRef = React.useContext(QuizCtx);

  // Keep the chatbot informed about the current boss question
  useEffect(() => {
    const q = qs[idx];
    if (phase === 'fight' && q) {
      quizCtxRef.setCurrent({ question: q, topic: TOPIC_BY[q.topic], locked, year, mode: 'boss' });
    } else {
      quizCtxRef.setCurrent(null);
    }
    return () => quizCtxRef.setCurrent(null);
  }, [phase, idx, locked]);

  useEffect(() => {
    if (phase !== 'fight' || locked) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { handleTimeout(); return 20; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [phase, locked, idx]);

  const handleTimeout = () => {
    setLocked(true);
    setPlayerHP(h => Math.max(0, h - 15));
    Audio.wrong();
    setShake(true); setTimeout(()=>setShake(false), 500);
  };

  const handleAnswer = (chosen) => {
    if (locked) return;
    clearInterval(timerRef.current);
    const ok = checkAnswer(qs[idx], chosen);
    setPicked(chosen); setLocked(true);
    Track.answer(ok, qs[idx].topic);
    if (ok) {
      Audio.correct(); fireConfetti({ count: 14 });
      setBossHP(h => Math.max(0, h - Math.round(100 / qs.length) - 2));
      setCorrect(c => c + 1);
    } else {
      Audio.wrong();
      setPlayerHP(h => Math.max(0, h - 10));
      setShake(true); setTimeout(()=>setShake(false), 500);
    }
  };

  const next = () => {
    if (bossHP <= 0 || playerHP <= 0 || idx + 1 >= qs.length) {
      setPhase('done');
      const win = bossHP <= 0 || correct >= Math.ceil(qs.length * 0.7);
      if (win) {
        Audio.level();
        fireConfetti({ count: 100 });
        Track.bossWon();
        setProgress(p => {
          const np = { ...p };
          np.bossesBeaten = (p.bossesBeaten || 0) + 1;
          np.xp = (p.xp || 0) + 250;
          np.level = computeLevel(np.xp);
          const unlocked = new Set(np.unlockedBadges);
          ACHIEVEMENTS.forEach(a => { if (a.rule(np)) unlocked.add(a.id); });
          np.unlockedBadges = [...unlocked];
          THEMES.forEach(t => { if (np.xp >= t.unlockXP && !np.unlockedThemes.includes(t.id)) np.unlockedThemes = [...np.unlockedThemes, t.id]; });
          return np;
        });
      }
      return;
    }
    setIdx(i => i + 1);
    setPicked(null);
    setLocked(false);
    setTimeLeft(20);
  };

  if (phase === 'intro') {
    return (
      <div className="max-w-2xl mx-auto px-4 py-10 text-center">
        <div className="card p-8 anim-pop">
          <div className="text-6xl anim-float">{boss.split(' ')[0]}</div>
          <h1 className="font-display text-3xl mt-2">{boss.slice(2)}</h1>
          <p className="text-muted mt-2">20 timed questions. 20 seconds each.<br/>Wrong answers cost HP. Win to earn 250 XP and a badge.</p>
          <button className="btn-primary mt-6" onClick={() => { Audio.boss(); setPhase('fight'); }}>Begin battle ⚔️</button>
          <button className="btn-ghost mt-2 ml-2" onClick={() => onNav({ page: 'dashboard', year })}>Retreat</button>
        </div>
      </div>
    );
  }

  if (phase === 'done') {
    const win = bossHP <= 0 || correct >= Math.ceil(qs.length * 0.7);
    return (
      <div className="max-w-2xl mx-auto px-4 py-10 text-center">
        <div className="card p-8 anim-pop">
          <div className="text-6xl">{win ? '🏆' : '💀'}</div>
          <h1 className="font-display text-3xl mt-2">{win ? 'Victory!' : 'Defeated'}</h1>
          <p className="text-muted mt-2">
            {win ? `You answered ${correct}/${qs.length} correctly and beat ${boss.split(' ').slice(1).join(' ')}!` : 'Boss too tough. Train more and try again.'}
          </p>
          <div className="flex gap-2 justify-center mt-6">
            <button className="btn-primary" onClick={() => onNav({ page: 'dashboard', year })}>Back to dashboard</button>
            <button className="btn-ghost" onClick={() => { setIdx(0); setBossHP(100); setPlayerHP(100); setCorrect(0); setPhase('intro'); }}>Try again</button>
          </div>
        </div>
      </div>
    );
  }

  const cur = qs[idx];
  return (
    <div className="max-w-2xl mx-auto px-4 py-6">
      {/* HP bars */}
      <div className="grid grid-cols-2 gap-3 mb-3">
        <div className="card p-3">
          <div className="flex justify-between text-xs"><span>You</span><span>{playerHP}/100</span></div>
          <div className="h-2 bg-sunken rounded-full overflow-hidden mt-1">
            <div className="h-full bg-success transition-all" style={{ width: `${playerHP}%` }} />
          </div>
        </div>
        <div className="card p-3">
          <div className="flex justify-between text-xs"><span>{boss}</span><span>{bossHP}/100</span></div>
          <div className="h-2 bg-sunken rounded-full overflow-hidden mt-1">
            <div className="h-full bg-danger transition-all" style={{ width: `${bossHP}%` }} />
          </div>
        </div>
      </div>

      <div className="flex items-center justify-between mb-2">
        <span className="text-sm text-muted">Q {idx+1} / {qs.length}</span>
        <span className={`pill ${timeLeft <= 5 ? 'anim-pulse-glow text-danger' : ''}`}>⏱ {timeLeft}s</span>
      </div>

      <div className={`card p-5 ${shake ? 'anim-shake' : 'anim-pop'}`} key={cur.id}>
        <div className="chip mb-2">{TOPIC_BY[cur.topic]?.emoji} {TOPIC_BY[cur.topic]?.name}</div>
        <h2 className="font-display text-lg mb-4">{cur.prompt}</h2>
        <QuestionRenderer question={cur} onAnswer={handleAnswer} locked={locked} picked={picked} />
        {locked && (
          <div className="mt-4">
            <div className={`card p-3 ${checkAnswer(cur, picked) ? 'border-success' : 'border-danger'}`}>
              {checkAnswer(cur, picked) ? '✅ Critical hit!' : '💢 Miss.'} <span className="text-muted">{cur.explanation}</span>
            </div>
            <button className="btn-primary w-full mt-3" onClick={next}>{idx + 1 >= qs.length ? 'Finish' : 'Next →'}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function LeaderboardPage({ year, progress, onNav }) {

  const baseTime = Date.parse('2024-01-01');
  const daysSince = (Date.now() - baseTime) / 86400000;
  const rivals = RIVALS.map(r => ({

// Topic keyword → KB key
function detectTopic(msg) {
  const m = msg.toLowerCase();
  const tests = [
    [/binary|0s? and 1s?/, 'binary'], [/\bbit\b/, 'bit'], [/\bbyte\b/, 'byte'],
    [/hex|hexadecimal/, 'hex'],
    [/algorithm/, 'algorithm'], [/flowchart/, 'flowchart'], [/pseudocode/, 'pseudocode'],
    [/decompos/, 'decomp'], [/abstract/, 'abstract'],
    [/python/, 'python'], [/variable/, 'variable'],
    [/loop|iteration|for loop|while loop|repeat/, 'loop'],
    [/\bif\b|selection|condition/, 'if'],
    [/\blist\b|array/, 'list'], [/function|def\b|method/, 'function'],
    [/logic gate|and gate|or gate|not gate|boolean/, 'logic'],
    [/truth table/, 'truthtable'],
    [/network|lan\b|wan\b/, 'network'], [/ip address|^ip\b/, 'ip'],
    [/https?|protocol/, 'http'], [/\bdns\b/, 'dns'],
    [/html|hyper.?text/, 'html'], [/css|style/, 'css'],
    [/scratch/, 'scratch'], [/sprite/, 'sprite'], [/broadcast/, 'broadcast'],
    [/password/, 'password'], [/phishing/, 'phishing'], [/malware|virus|ransom/, 'malware'],
    [/encrypt|decrypt|cipher/, 'encrypt'], [/\bhash|salt/, 'hash'],
    [/\bcpu\b/, 'cpu'], [/\bram\b/, 'ram'], [/\brom\b/, 'rom'], [/\bgpu\b/, 'gpu'],
    [/operating system|\bos\b/, 'os'],
    [/ethic|gdpr|misuse/, 'ethics'],
  ];
  for (const [re, key] of tests) if (re.test(m)) return key;
  return null;
}

function pickOne(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Teaching-only hint — never reveals the answer.
// Uses the question's hint, eliminates *one* very-wrong option, or asks a Socratic prompt.
function teachingHint(q) {
  if (q.hint) return `🧠 ${q.hint}\n\nThink it through — you've got this.`;

  if (q.type === 'mc' && Array.isArray(q.options) && q.options.length >= 4) {
    // Eliminate ONE option (never more — don't make it too easy)
    const wrongs = q.options.map((_, i) => i).filter(i => i !== q.answer);
    const elim = wrongs[Math.floor(Math.random() * wrongs.length)];
    return `🧠 I won't tell you the answer — but I'll narrow it down. It's definitely **not** "${q.options[elim]}". Now compare what's left carefully. 💪`;
  }
  if (q.type === 'tf') {
    return `🧠 Try to think of an example AND a counter-example. If you can find even one case where the statement breaks, it's False. If it always holds, it's True.`;
  }
  if (q.type === 'fitb') {
    const a = String(q.answer);
    if (/^[01]+$/.test(a)) {
      return `🧠 Binary tip: write out the place values (128 64 32 16 8 4 2 1) and find which add up to the number. Each column you use puts a 1; otherwise 0. The answer needs ${a.length} bits.`;
    }
    return `🧠 Look for a keyword in the question that points to a single concept. The answer is a short, specific word.`;
  }
  if (q.type === 'order') {
    return `🧠 Ask yourself: what MUST happen first? What couldn't possibly happen until something else has? Build the sequence one step at a time.`;
  }
  if (q.type === 'match') {
    return `🧠 Read both columns fully first. Find the pairing you're *most* sure of and lock it in — then it's easier to match the rest.`;
  }
  return `🧠 Re-read the question slowly. Underline keywords in your head. What's it really asking?`;
}

// Concept-level explanation (no answer leak) — used when student asks "explain"
function conceptHelp(q) {
  const t = q.topic;
  const map = {
    binary: KB.binary, bit: KB.bit, byte: KB.byte, hex: KB.hex,
    ct: KB.decomp, algo: KB.algorithm, flowchart: KB.flowchart,
    python: KB.python, iter: KB.loop, logic: KB.logic, data: KB.bit,
    hw: KB.cpu, net: KB.network, sec: KB.password,
    web: KB.html, scratch: KB.scratch,
  };
  return map[t] || 'Think about the topic this question relates to and what you know about it.';
}

// Main intent + response generator
function generateReply(message, ctx) {
  const m = message.toLowerCase().trim();
  if (!m) return 'Type something and I\'ll do my best to help! 😊';

  // Greetings & social
  if (/^(hi|hello|hey|sup|yo|hiya|hola)\b/.test(m)) {
    return pickOne([
      'Hey! 👋 Need a hint, a clue, or an explanation?',
      'Hi there! Ask me anything about computing.',
      'Hello! I can help with the current question or any KS3 topic — what\'s up?',
    ]);
  }
  if (/(thanks|thank you|^ty\b|cheers|appreciate|nice one)/i.test(m)) {
    return pickOne(['You\'re welcome! 🌟 Keep going!', 'Anytime — you\'ve got this! 💪', 'No worries 🙂 Smash the next one!']);
  }
  if (/^(who are you|what are you|your name)/i.test(m)) {
    return 'I\'m **Quanta** — your computing buddy! 🤖 Ask me for hints on the current question, or about any KS3 topic like binary, Python, logic gates, networks…';
  }
  if (/joke|funny/i.test(m)) {
    return pickOne([
      'Why do programmers prefer dark mode? Because light attracts bugs! 🐛',
      'How many programmers does it take to change a lightbulb? None — it\'s a hardware problem. 💡',
      'There are 10 types of people in the world: those who understand binary, and those who don\'t. 😄',
    ]);
  }

  // Quiz-context-aware replies — NEVER reveal the answer
  if (ctx && ctx.question) {
    const q = ctx.question;

    // Student asking for the answer — politely refuse, give a teaching hint
    if (/(give up|reveal|tell me|show me|just the answer|what's the answer|what is the answer|answer please)/i.test(m)) {
      return pickOne([
        `🙅 I won't give you the answer — Mr Borketey wants you thinking, not copying! But here's a clue:\n\n${teachingHint(q)}`,
        `🚫 No spoilers from me — figuring it out is how you actually learn. Try this:\n\n${teachingHint(q)}`,
        `💡 I'm here to *teach*, not to do it for you. Have a proper think:\n\n${teachingHint(q)}`,
      ]);
    }
    // Hint / help / stuck — teach
    if (/(hint|clue|help|stuck|don't know|dunno|nudge|tip|teach me|coach)/i.test(m)) {
      return teachingHint(q);
    }
    // Explain — concept-level only (no spoiler) before answering; full explanation after
    if (/(explain|why|how come|because|reason|teach)/i.test(m)) {
      if (ctx.locked) {
        // After they've answered, explanation is on the card — point them there
        return `📖 The explanation appears under the question card after you answer. The big idea here is:\n\n${conceptHelp(q)}`;
      }
      return `📖 I can teach you the *concept* without spoiling it:\n\n${conceptHelp(q)}\n\nNow look at the question again with that in mind.`;
    }
    if (/(harder|easier|change topic|different)/i.test(m)) {
      return 'Go back to the dashboard to pick a different topic or boss battle. I\'ll come with you!';
    }
    if (/(too hard|impossible|i can't|cant)/i.test(m)) {
      return pickOne([
        `You've got this 💪 — start by ruling out the most clearly wrong option. ${teachingHint(q)}`,
        `Take a breath and re-read. No question is impossible — just one step away.\n\n${teachingHint(q)}`,
        `Tough question, but you can crack it. Here's a way in:\n\n${teachingHint(q)}`,
      ]);
    }
  }

  // Topic queries
  const key = detectTopic(m);
  if (key && KB[key]) return KB[key];

  // Question-shape detection (e.g. "what is …")
  if (/^(what|how|why)\b/i.test(m)) {
    return pickOne([
      'I\'m not 100% sure on that one, but I know lots about KS3 topics: try "what is binary?", "explain loops", "how does HTTPS work?"',
      'Hmm, can you ask using a keyword? I respond well to topic names like "binary", "logic gate", "Python", "encryption", "network"…',
    ]);
  }

  // Fallback
  return pickOne([
    'I didn\'t catch that. Try a topic word like "binary", "python", "scratch", or click a suggestion below 👇',
    'Hmm, I\'m not sure. I know most KS3 computing topics — try asking "what is …?" with a topic name.',
    'Not sure on that one! On a quiz, ask for a "hint" or just say "answer" to reveal it.',
  ]);
}

function Chatbot() {
  const [open, setOpen] = useState(false);
  const [unread, setUnread] = useState(0);
  const [messages, setMessages] = useState([
    { from: 'bot', text: 'Hi! I\'m **Quanta** 🤖 your study buddy. I won\'t give you answers — but I\'ll give you clues, teach you the concept, and help you figure things out yourself. Ask me anything! 🌟' }
  ]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const { current: quizCtx } = React.useContext(QuizCtx);
  const endRef = useRef();

  // Context-aware suggestions (no "reveal the answer" — Quanta teaches, never tells)
  const suggestions = quizCtx && quizCtx.question
    ? ['💡 Give me a clue', '🧠 Teach me this concept', '😵 I\'m stuck']
    : ['What is binary?', 'How do loops work?', 'Explain logic gates', 'What is HTML?'];

  const push = (m) => setMessages(prev => [...prev, m]);

  const ask = (text) => {
    if (!text.trim()) return;
    push({ from: 'user', text });
    setInput('');
    setTyping(true);
    Track.chatMsg();
    // Slight delay so it feels conversational
    setTimeout(() => {
      const reply = generateReply(text, quizCtx);
      push({ from: 'bot', text: reply });
      setTyping(false);
      if (!open) setUnread(u => u + 1);
    }, 450 + Math.random() * 350);
  };

  useEffect(() => {
    if (open) setUnread(0);
  }, [open]);

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, [messages, typing, open]);

  // Render bold **text** in messages
  const renderText = (txt) => {
    const parts = txt.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p, i) =>
      p.startsWith('**') && p.endsWith('**')
        ? <strong key={i}>{p.slice(2, -2)}</strong>
        : <Fragment key={i}>{p}</Fragment>
    );
  };

  return (
    <Fragment>
      <button className="cq-fab" aria-label="Ask Quanta for help"
              onClick={() => setOpen(o => !o)}>
        {open ? '✕' : '💬'}
        {!open && unread > 0 && <span className="cq-bot-badge">{unread}</span>}
      </button>

      {open && (
        <div className="cq-panel anim-pop" role="dialog" aria-label="Chat with Quanta">
          <div className="cq-panel-header">
            <Mascot size={36} mood="happy" />
            <div className="leading-tight">
              <div className="name">Quanta</div>
              <div className="role">Your computing buddy</div>
            </div>
            <button className="cq-close-btn" onClick={() => setOpen(false)} aria-label="Close">✕</button>
          </div>

          <div className="cq-messages">
            {messages.map((m, i) => (
              <div key={i} className={`cq-msg ${m.from === 'user' ? 'cq-msg-user' : 'cq-msg-bot'}`}>
                {renderText(m.text)}
              </div>
            ))}
            {typing && (
              <div className="cq-msg cq-msg-bot">
                <div className="cq-typing"><span/><span/><span/></div>
              </div>
            )}
            <div ref={endRef}></div>
          </div>

          <div className="cq-suggestions">
            {suggestions.map(s => (
              <button key={s} onClick={() => ask(s.replace(/^[^\w]+/, '').trim())}>{s}</button>
            ))}
          </div>

          <div className="cq-input-row">
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') ask(input); }}
              placeholder={quizCtx ? 'Ask for a hint or explain…' : 'Ask me a computing question…'}
              aria-label="Type your question" />
            <button className="cq-send-btn" onClick={() => ask(input)} disabled={!input.trim()}>Send</button>
          </div>
        </div>
      )}
    </Fragment>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */
function App() {
  const [progress, setProgressState] = useState(loadProgress);
  const [route, setRoute] = useState({ page: 'home' });
  const [quizCurrent, setQuizCurrent] = useState(null);
  const quizCtxValue = useMemo(() => ({ current: quizCurrent, setCurrent: setQuizCurrent }), [quizCurrent]);

  const setProgress = useCallback(updater => {
    setProgressState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveProgress(next);
      return next;
    });
  }, []);

  // Apply theme + dark mode to <html>
  useEffect(() => {
    const root = document.documentElement;
    root.setAttribute('data-theme', progress.theme || 'playful');
    root.classList.toggle('cq-dark', !!progress.dark);
    root.classList.toggle('cq-light', !progress.dark);
  }, [progress.theme, progress.dark]);

  // Recompute streak on load + log a visit + handle deep-link hash
  useEffect(() => {
    Track.visit();
    if (window.location.hash === '#teacher') setRoute({ page: 'teacher' });
    if (!progress.lastPlayedISO) return;
    const today = todayISO();
    const yest  = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if (progress.lastPlayedISO !== today && progress.lastPlayedISO !== yest && progress.streakDays !== 0) {
      setProgress(p => ({ ...p, streakDays: 0 }));
    }
  }, []);

  const nav = useCallback((next) => { Audio.tap(); setRoute(next); window.scrollTo({ top:0, behavior:'smooth' }); }, []);

  let view;
  switch (route.page) {
    case 'dashboard':    view = <DashboardPage year={route.year} progress={progress} onNav={nav} />; break;
    case 'quiz':         view = <QuizPage year={route.year} topicId={route.topicId} mode={route.mode} progress={progress} setProgress={setProgress} onNav={nav} />; break;
    case 'results':      view = <ResultsPage progress={progress} onNav={nav} />; break;
    case 'boss':         view = <BossPage year={route.year} progress={progress} setProgress={setProgress} onNav={nav} />; break;
    case 'achievements': view = <AchievementsPage progress={progress} onNav={nav} />; break;
    case 'leaderboard':  view = <LeaderboardPage year={route.year} progress={progress} onNav={nav} />; break;
    case 'settings':     view = <SettingsPage progress={progress} setProgress={setProgress} onNav={nav} />; break;
    case 'teacher':      view = <TeacherPage onNav={nav} />; break;
    default:             view = <HomePage progress={progress} onYear={(y) => nav({ page: 'dashboard', year: y })} />;
  }

  return (
    <QuizCtx.Provider value={quizCtxValue}>
      <Header progress={progress} onNav={nav} currentPage={route.page} />
      <main key={route.page + (route.year || '') + (route.topicId || '')} className="anim-slideUp">
        {view}
      </main>
      <Chatbot />
      <footer className="max-w-5xl mx-auto px-4 py-10 text-center text-muted text-xs space-y-2">
        <div className="font-display text-sm text-ink">
          ComputeQuest · Free practice for KS3 Computing · OCR-aligned · No login, no tracking.
        </div>
        <div>
          Created by <span className="text-ink font-semibold">Mr Borketey</span> ·
          <a href="mailto:j.borketey@harrispurley.org.uk" className="text-primary hover:underline ml-1">j.borketey@harrispurley.org.uk</a>
        </div>
        <div>
          © 2026 Mr Borketey. All rights reserved. ComputeQuest™ — content, code and design are the intellectual property of the author.
          Unauthorised commercial redistribution, resale or republication is prohibited. Permission is granted for non-commercial classroom use.
        </div>
      </footer>
    </QuizCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
